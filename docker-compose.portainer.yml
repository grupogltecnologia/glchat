services:
  app:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: glchat-app
    restart: unless-stopped
    environment:
      APP_NAME: GLChat
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL}
      APP_BASE_PATH: /
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: glchat
      DB_USER: glchat
      DB_PASS: ${DB_PASS}
      DB_CHARSET: utf8mb4
      JWT_SECRET: ${JWT_SECRET}
      REALTIME_HOST: 0.0.0.0
      REALTIME_PORT: 8090
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM_EMAIL: ""
      SMTP_FROM_NAME: GLChat
    volumes:
      - glchat_storage:/var/www/html/storage
      - glchat_public_uploads:/var/www/html/public/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - glchat
      - proxy

  websocket:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: glchat-websocket
    restart: unless-stopped
    command: ["php", "bin/chat-websocket-server.php"]
    environment:
      APP_NAME: GLChat
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL}
      APP_BASE_PATH: /
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: glchat
      DB_USER: glchat
      DB_PASS: ${DB_PASS}
      DB_CHARSET: utf8mb4
      JWT_SECRET: ${JWT_SECRET}
      REALTIME_HOST: 0.0.0.0
      REALTIME_PORT: 8090
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - glchat
      - proxy

  mysql:
    image: mysql:8.0
    container_name: glchat-mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: glchat
      MYSQL_USER: glchat
      MYSQL_PASSWORD: ${DB_PASS}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: America/Sao_Paulo
    volumes:
      - glchat_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - glchat

  minio:
    image: minio/minio:latest
    container_name: glchat-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: glchat_minio
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_CONSOLE_URL}
    volumes:
      - glchat_minio:/data
    networks:
      - glchat
      - proxy

  minio-init:
    image: minio/mc:latest
    container_name: glchat-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 glchat_minio ${MINIO_ROOT_PASSWORD};
      mc mb -p local/glchat || true;
      mc anonymous set download local/glchat || true;
      "
    networks:
      - glchat

volumes:
  glchat_mysql:
  glchat_minio:
  glchat_storage:
  glchat_public_uploads:

networks:
  glchat:
  proxy:
    external: true
    name: ${PROXY_NETWORK:-proxy}
